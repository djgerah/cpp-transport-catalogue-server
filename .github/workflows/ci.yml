name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ make cmake \
            libcpprest-dev \
            libboost-system-dev \
            libssl-dev \
            libgtest-dev \
            clang-format

      - name: Build project
        run: make build

      - name: Run tests
        run: make test

      - name: Check formatting
        run: |
          make clang-format
          git diff --exit-code