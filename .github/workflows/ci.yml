name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ make \
            libcpprest-dev \
            libboost-system-dev \
            libssl-dev \
            clang-format

      - name: Build
        run: make build

      - name: Check formatting
        run: |
          make clang-format
          git diff --exit-code

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transport_catalogue
          path: build/transport_catalogue
